    // ============================================================
    // DETECTION & CORE FUNCTIONS
    // ============================================================

    let cancelScan = false;

    function detectType(input) {
        input = input.trim();
        if (/^(\d{1,3}\.){3}\d{1,3}$/.test(input)) return 'ip';
        if (/^[\+]?[(]?[0-9]{1,4}[)]?[-\s\.]?[0-9]{1,4}[-\s\.]?[0-9]{1,4}[-\s\.]?[0-9]{1,9}$/.test(input.replace(/\s/g, ''))) return 'phone';
        if (/^[\w\.-]+@[\w\.-]+\.\w+$/.test(input)) return 'email';
        if (/^[a-zA-Z0-9][a-zA-Z0-9-]{1,61}[a-zA-Z0-9]\.[a-zA-Z]{2,}$/.test(input)) return 'domain';
        if (/^[a-zA-Z\s]{2,}$/.test(input) && input.includes(' ')) return 'name';
        return 'username';
    }

    async function checkPlatform(username, platform, config) {
        const url = config.url.replace('{}', encodeURIComponent(username));
        try {
            const response = await fetch(url, { headers: { 'User-Agent': 'Mozilla/5.0' }, signal: AbortSignal.timeout(5000) });
            const exists = await config.check(response);
            return { platform, exists, url };
        } catch {
            return { platform, exists: false, url, error: true };
        }
    }

    async function investigateUsername(username, onProgress) {
        const entries = Object.entries(PLATFORMS);
        const results = [];
        const batchSize = 20;
        let completed = 0;
        for (let i = 0; i < entries.length; i += batchSize) {
            if (cancelScan) break;
            const batch = entries.slice(i, i + batchSize);
            const checks = batch.map(([platform, config]) => checkPlatform(username, platform, config));
            const batchResults = await Promise.all(checks);
            results.push(...batchResults);
            completed += batchResults.length;
            if (onProgress) onProgress(completed, entries.length);
        }
        return results;
    }

    async function investigateEmail(email) {
        const results = [];
        try {
            const r = await fetch(`https://api.pwnedpasswords.com/breachedaccount/${email}`);
            if (r.status === 200) { const d = await r.json();
                results.push({ type: 'breach', count: d.length, breaches: d.map(b => b.Name) }); } else if (r.status === 404) results.push({ type: 'breach', count: 0, breaches: [] });
        } catch { results.push({ type: 'breach', error: 'Could not check breaches' }); }
        results.push({ type: 'info', message: `Domain: ${email.split('@')[1]}` });
        try {
            const r = await fetch(`https://api.github.com/search/commits?q=author-email:${email}`, { headers: { 'Accept': 'application/vnd.github.cloak-preview' } });
            if (r.status === 200) { const d = await r.json();
                results.push({ type: 'github', count: d.total_count || 0 }); }
        } catch {}
        return results;
    }

    async function investigatePhone(phone) {
        const clean = phone.replace(/[\s\-\(\)]/g, '');
        return [{ type: 'info', message: `Phone: ${phone}` }, { type: 'info', message: `Cleaned: ${clean}` }, { type: 'note', message: 'Full phone intelligence requires premium APIs' }];
    }

    async function investigateName(name) {
        const results = [];
        const parts = name.split(' ');
        const first = parts[0];
        const last = parts[parts.length - 1];
        results.push({ type: 'info', message: `Full Name: ${name}` });
        results.push({ type: 'info', message: `First: ${first} · Last: ${last}` });
        const variants = [...new Set([
            first.toLowerCase(), last.toLowerCase(),
            `${first}${last}`.toLowerCase(),
            `${first}.${last}`.toLowerCase(),
            `${first}_${last}`.toLowerCase(),
            `${first}${last[0]}`.toLowerCase(),
            `${first[0]}${last}`.toLowerCase()
        ])].slice(0, 5);
        for (const v of variants) {
            const r = await investigateUsername(v);
            const found = r.filter(x => x.exists);
            if (found.length) results.push({ type: 'found_variant', variant: v, platforms: found.map(x => ({ platform: x.platform, url: x.url })) });
        }
        return results;
    }

    async function investigateDomain(domain) {
        const results = [];
        try {
            const r = await fetch(`https://whois-api.com/api/v1/whois?domain=${domain}`);
            if (r.status === 200) { const d = await r.json();
                results.push({ type: 'whois', registrar: d.registrar || 'Unknown', created: d.creation_date || 'Unknown', expires: d.expiration_date || 'Unknown' }); }
        } catch {}
        const subs = ['www', 'mail', 'ftp', 'blog', 'api', 'dev', 'test', 'admin', 'app', 'support'];
        const found = [];
        for (const sub of subs) {
            try { await fetch(`http://${sub}.${domain}`, { mode: 'no-cors' });
                found.push(`${sub}.${domain}`); } catch {}
        }
        if (found.length) results.push({ type: 'subdomains', found });
        return results;
    }

    async function investigateIP(ip) {
        const results = [];
        try {
            const response = await fetch(`http://ip-api.com/json/${ip}?fields=status,message,country,regionName,city,isp,org,as,lat,lon,timezone,proxy,mobile`);
            const data = await response.json();
            if (data.status === 'success') {
                results.push({ type: 'ipinfo', data: data });
            } else {
                results.push({ type: 'error', message: data.message || 'IP lookup failed' });
            }
        } catch (e) {
            results.push({ type: 'error', message: 'Could not fetch IP data' });
        }
        return results;
    }

    async function startInvestigation() {
        const target = targetInput.value.trim();
        if (!target) {
            statusText.textContent = '⚠️ Please enter a target';
            return;
        }

        cancelScan = false;
        cancelBtn.style.display = 'inline-block';
        investigateBtn.disabled = true;
        investigateBtn.textContent = '⏳ SCANNING...';
        statusText.textContent = `🔍 Scanning ${target}...`;
        resultsArea.innerHTML = '<span class="loading">⏳ Scanning... Please wait</span>';

        const type = selectedType === 'auto' ? detectType(target) : selectedType;

        try {
            let results = [];
            if (type === 'username') {
                results = await investigateUsername(target, (done, total) => {
                    statusText.textContent = `🔍 Scanning ${target} — ${done}/${total} platforms`;
                });
                displayResults(target, results);
            } else if (type === 'email') {
                results = await investigateEmail(target);
                displayEmailResults(target, results);
            } else if (type === 'phone') {
                results = await investigatePhone(target);
                displayGenericResults(target, results, 'PHONE REPORT', '📱');
            } else if (type === 'name') {
                results = await investigateName(target);
                displayNameResults(target, results);
            } else if (type === 'ip') {
                results = await investigateIP(target);
                displayIPResults(target, results);
            } else if (type === 'domain') {
                results = await investigateDomain(target);
                displayGenericResults(target, results, 'DOMAIN REPORT', '🌐');
            } else {
                results = await investigateUsername(target);
                displayResults(target, results);
            }
            saveHistory(target);
            statusText.textContent = `✅ Complete — ${type.toUpperCase()} · ${results.length} checks`;
        } catch (err) {
            resultsArea.innerHTML = `<span class="red">❌ Error: ${err.message}</span>`;
            statusText.textContent = '❌ Error';
        }

        investigateBtn.disabled = false;
        investigateBtn.textContent = 'INVESTIGATE';
        cancelBtn.style.display = 'none';
    }
</script>
</body>
</html>
