    // ==================== DETECTION FUNCTIONS ====================
    
    function detectType(input) {
        input = input.trim();
        if (/^[\+]?[(]?[0-9]{1,4}[)]?[-\s\.]?[0-9]{1,4}[-\s\.]?[0-9]{1,4}[-\s\.]?[0-9]{1,9}$/.test(input.replace(/\s/g, ''))) {
            return 'phone';
        }
        if (/^[\w\.-]+@[\w\.-]+\.\w+$/.test(input)) {
            return 'email';
        }
        if (/^[a-zA-Z0-9][a-zA-Z0-9-]{1,61}[a-zA-Z0-9]\.[a-zA-Z]{2,}$/.test(input)) {
            return 'domain';
        }
        if (/^[a-zA-Z\s]{2,}$/.test(input) && input.includes(' ')) {
            return 'name';
        }
        return 'username';
    }

    // ==================== OSINT FUNCTIONS ====================
    
    async function checkPlatform(username, platform, config) {
        const url = config.url.replace('{}', encodeURIComponent(username));
        try {
            const response = await fetch(url, {
                headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36' },
                signal: AbortSignal.timeout(6000)
            });
            const exists = await config.check(response);
            return { platform, exists, url };
        } catch (e) {
            return { platform, exists: false, url, error: true };
        }
    }
    
    async function investigateUsername(username) {
        const entries = Object.entries(PLATFORMS);
        const results = [];
        const batchSize = 15;
        
        for (let i = 0; i < entries.length; i += batchSize) {
            const batch = entries.slice(i, i + batchSize);
            const checks = batch.map(([platform, config]) =>
                checkPlatform(username, platform, config)
            );
            const batchResults = await Promise.all(checks);
            results.push(...batchResults);
        }
        return results;
    }
    
    async function investigateEmail(email) {
        const results = [];
        
        try {
            const response = await fetch(`https://api.pwnedpasswords.com/breachedaccount/${email}`);
            if (response.status === 200) {
                const data = await response.json();
                results.push({ type: 'breach', count: data.length, breaches: data.map(b => b.Name) });
            } else if (response.status === 404) {
                results.push({ type: 'breach', count: 0, breaches: [] });
            }
        } catch {
            results.push({ type: 'breach', error: 'Could not check breaches' });
        }
        
        const domain = email.split('@')[1];
        results.push({ type: 'info', message: `Domain: ${domain}` });
        
        try {
            const response = await fetch(
                `https://api.github.com/search/commits?q=author-email:${email}`,
                { headers: { 'Accept': 'application/vnd.github.cloak-preview' } }
            );
            if (response.status === 200) {
                const data = await response.json();
                results.push({ type: 'github', count: data.total_count || 0 });
            }
        } catch {}
        
        results.push({ type: 'valid', valid: true });
        return results;
    }
    
    async function investigatePhone(phone) {
        const results = [];
        const cleanPhone = phone.replace(/[\s\-\(\)]/g, '');
        results.push({ type: 'info', message: `Phone: ${phone}` });
        results.push({ type: 'info', message: `Cleaned: ${cleanPhone}` });
        results.push({ type: 'note', message: 'Full phone intelligence requires premium APIs' });
        return results;
    }
    
    async function investigateName(name) {
        const results = [];
        const parts = name.split(' ');
        const firstName = parts[0];
        const lastName = parts[parts.length - 1];
        
        results.push({ type: 'info', message: `Full Name: ${name}` });
        results.push({ type: 'info', message: `First: ${firstName} · Last: ${lastName}` });
        
        const variants = [
            firstName.toLowerCase(),
            lastName.toLowerCase(),
            `${firstName}${lastName}`.toLowerCase(),
            `${firstName}.${lastName}`.toLowerCase(),
            `${firstName}_${lastName}`.toLowerCase(),
            `${firstName}${lastName[0]}`.toLowerCase(),
            `${firstName[0]}${lastName}`.toLowerCase()
        ];
        
        const uniqueVariants = [...new Set(variants)].slice(0, 4);
        for (const variant of uniqueVariants) {
            const platformResults = await investigateUsername(variant);
            const found = platformResults.filter(r => r.exists);
            if (found.length > 0) {
                results.push({ 
                    type: 'found_variant', 
                    variant: variant, 
                    platforms: found.map(r => r.platform).slice(0, 8)
                });
            }
        }
        
        return results;
    }
    
    async function investigateDomain(domain) {
        const results = [];
        
        try {
            const response = await fetch(`https://whois-api.com/api/v1/whois?domain=${domain}`);
            if (response.status === 200) {
                const data = await response.json();
                results.push({
                    type: 'whois',
                    registrar: data.registrar || 'Unknown',
                    created: data.creation_date || 'Unknown',
                    expires: data.expiration_date || 'Unknown'
                });
            }
        } catch {}
        
        const subdomains = ['www', 'mail', 'ftp', 'blog', 'api', 'dev', 'test', 'admin', 'app', 'support'];
        const found = [];
        for (const sub of subdomains) {
            try {
                await fetch(`http://${sub}.${domain}`, { mode: 'no-cors' });
                found.push(`${sub}.${domain}`);
            } catch {}
        }
        if (found.length > 0) {
            results.push({ type: 'subdomains', found });
        }
        
        return results;
    }
    
    // ==================== UI CONTROLS ====================
    
    const targetInput = document.getElementById('targetInput');
    const investigateBtn = document.getElementById('investigateBtn');
    const statusText = document.getElementById('statusText');
    const resultsArea = document.getElementById('resultsArea');
    const typeButtons = document.querySelectorAll('.search-type-selector button');
    let selectedType = 'auto';
    
    typeButtons.forEach(btn => {
        btn.addEventListener('click', function() {
            typeButtons.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            selectedType = this.dataset.type;
            const placeholders = {
                'auto': 'username, email@domain.com, +1234567890, or full name',
                'username': 'username (e.g., elonmusk)',
                'email': 'email@domain.com',
                'phone': '+1234567890 or 123-456-7890',
                'name': 'full name (e.g., John Doe)',
                'domain': 'domain.com'
            };
            targetInput.placeholder = placeholders[selectedType] || placeholders.auto;
            statusText.textContent = `● Ready — ${selectedType.toUpperCase()} mode · 75+ platforms`;
        });
    });
    
    targetInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') startInvestigation();
    });
    
    investigateBtn.addEventListener('click', startInvestigation);
    
    async function startInvestigation() {
        const target = targetInput.value.trim();
        if (!target) {
            statusText.textContent = '⚠️ Please enter a target';
            return;
        }
        
        investigateBtn.disabled = true;
        investigateBtn.textContent = '⏳ SCANNING...';
        statusText.textContent = `🔍 Investigating ${target} across 75+ platforms...`;
        resultsArea.innerHTML = '<span class="loading">⏳ Scanning across 75+ platforms... Please wait (30-60 seconds)</span>';
        
        let targetType = selectedType;
        if (targetType === 'auto') {
            targetType = detectType(target);
        }
        
        try {
            let results = [];
            let title = '';
            
            switch(targetType) {
                case 'username':
                    results = await investigateUsername(target);
                    title = 'USERNAME REPORT';
                    displayResults(target, results, title, '👤');
                    break;
                case 'email':
                    results = await investigateEmail(target);
                    title = 'EMAIL REPORT';
                    displayEmailResults(target, results);
                    break;
                case 'phone':
                    results = await investigatePhone(target);
                    title = 'PHONE REPORT';
                    displayGenericResults(target, results, title, '📱');
                    break;
                case 'name':
                    results = await investigateName(target);
                    title = 'NAME REPORT';
                    displayNameResults(target, results);
                    break;
                case 'domain':
                    results = await investigateDomain(target);
                    title = 'DOMAIN REPORT';
                    displayGenericResults(target, results, title, '🌐');
                    break;
                default:
                    results = await investigateUsername(target);
                    title = 'USERNAME REPORT';
                    displayResults(target, results, title, '👤');
            }
            
            statusText.textContent = `✅ Complete — ${targetType.toUpperCase()} · ${results.length} checks`;
        } catch (error) {
            resultsArea.innerHTML = `<span class="red">❌ Error: ${error.message}</span>`;
            statusText.textContent = '❌ Error occurred';
        }
        
        investigateBtn.disabled = false;
        investigateBtn.textContent = 'INVESTIGATE';
    }
    
    function displayResults(target, results, title, icon) {
        const found = results.filter(r => r.exists);
        const total = results.length;
        
        let html = `<span class="brand">✦ SHAWTY.OSINT — ${title}</span>\n`;
        html += `<span class="dim">${'—'.repeat(70)}</span>\n`;
        html += `<span class="glow">${icon} ${target}</span>\n`;
        html += `<span class="blue">📍 Found on ${found.length}/${total} platforms</span>\n\n`;
        
        if (found.length > 0) {
            html += `<span class="found">✅ FOUND (${found.length})</span>\n`;
            
            // Group into columns for better display
            const foundPlatforms = found.map(r => ({ name: r.platform, url: r.url }));
            const chunkSize = Math.ceil(foundPlatforms.length / 3);
            const chunks = [];
            for (let i = 0; i < foundPlatforms.length; i += chunkSize) {
                chunks.push(foundPlatforms.slice(i, i + chunkSize));
            }
            
            // Display as grid
            for (const r of found) {
                html += `  <span class="found">●</span> ${r.platform}: <span class="dim">${r.url}</span>\n`;
            }
            
            const notFound = results.filter(r => !r.exists && !r.error);
            if (notFound.length > 0) {
                html += `\n<span class="notfound">○ NOT FOUND (${notFound.length})</span>\n`;
                const show = notFound.slice(0, 20);
                for (const r of show) {
                    html += `  <span class="notfound">○</span> ${r.platform}\n`;
                }
                if (notFound.length > 20) {
                    html += `  <span class="dim">... and ${notFound.length - 20} more</span>\n`;
                }
            }
        } else {
            html += `<span class="notfound">❌ No active profiles found on any platform</span>\n`;
        }
        
        html += `\n<span class="dim">${'—'.repeat(70)}</span>\n`;
        html += `<span class="dim">SHAWTY.OSINT · ${new Date().toLocaleString()} · ${total} platforms checked</span>`;
        
        resultsArea.innerHTML = html;
    }
    
    function displayEmailResults(email, results) {
        let html = `<span class="brand">✦ SHAWTY.OSINT — EMAIL REPORT</span>\n`;
        html += `<span class="dim">${'—'.repeat(70)}</span>\n`;
        html += `<span class="glow">📧 ${email}</span>\n\n`;
        
        for (const r of results) {
            if (r.type === 'breach') {
                if (r.count > 0) {
                    html += `<span class="red">⚠️ BREACHES FOUND: ${r.count}</span>\n`;
                    for (const breach of r.breaches.slice(0, 8)) {
                        html += `  <span class="red">◈</span> ${breach}\n`;
                    }
                    if (r.breaches.length > 8) {
                        html += `  <span class="dim">... and ${r.breaches.length - 8} more</span>\n`;
                    }
                } else {
                    html += `<span class="found">✅ No breaches found — email appears safe</span>\n`;
                }
            }
            if (r.type === 'info') {
                html += `<span class="blue">✦ ${r.message}</span>\n`;
            }
            if (r.type === 'github') {
                if (r.count > 0) {
                    html += `<span class="pink">📝 GitHub commits: ${r.count}</span>\n`;
                } else {
                    html += `<span class="dim">📝 No GitHub commits found</span>\n`;
                }
            }
        }
        
        html += `\n<span class="dim">${'—'.repeat(70)}</span>\n`;
        html += `<span class="dim">SHAWTY.OSINT · ${new Date().toLocaleString()}</span>`;
        
        resultsArea.innerHTML = html;
    }
    
    function displayGenericResults(target, results, title, icon) {
        let html = `<span class="brand">✦ SHAWTY.OSINT — ${title}</span>\n`;
        html += `<span class="dim">${'—'.repeat(70)}</span>\n`;
        html += `<span class="glow">${icon} ${target}</span>\n\n`;
        
        for (const r of results) {
            if (r.type === 'info') {
                html += `<span class="blue">✦ ${r.message}</span>\n`;
            }
            if (r.type === 'note') {
                html += `<span class="yellow">○ ${r.message}</span>\n`;
            }
            if (r.type === 'whois') {
                html += `<span class="section">✦ WHOIS</span>\n`;
                html += `  Registrar: <span class="pink">${r.registrar}</span>\n`;
                html += `  Created: <span class="dim">${r.created}</span>\n`;
                html += `  Expires: <span class="dim">${r.expires}</span>\n`;
            }
            if (r.type === 'subdomains') {
                html += `\n<span class="found">📂 SUBDOMAINS (${r.found.length})</span>\n`;
                for (const sub of r.found) {
                    html += `  <span class="found">→</span> ${sub}\n`;
                }
            }
        }
        
        html += `\n<span class="dim">${'—'.repeat(70)}</span>\n`;
        html += `<span class="dim">SHAWTY.OSINT · ${new Date().toLocaleString()}</span>`;
        
        resultsArea.innerHTML = html;
    }
    
    function displayNameResults(name, results) {
        let html = `<span class="brand">✦ SHAWTY.OSINT — NAME REPORT</span>\n`;
        html += `<span class="dim">${'—'.repeat(70)}</span>\n`;
        html += `<span class="glow">📝 ${name}</span>\n\n`;
        
        for (const r of results) {
            if (r.type === 'info') {
                html += `<span class="blue">✦ ${r.message}</span>\n`;
            }
            if (r.type === 'found_variant') {
                html += `<span class="found">✅ Username variant "${r.variant}" found on ${r.platforms.length} platforms:</span>\n`;
                for (const p of r.platforms) {
                    html += `  <span class="found">●</span> ${p}\n`;
                }
            }
        }
        
        const foundVariants = results.filter(r => r.type === 'found_variant');
        if (foundVariants.length === 0) {
            html += `<span class="notfound">❌ No username variants found</span>\n`;
        }
        
        html += `\n<span class="dim">${'—'.repeat(70)}</span>\n`;
        html += `<span class="dim">SHAWTY.OSINT · ${new Date().toLocaleString()}</span>`;
        
        resultsArea.innerHTML = html;
    }
